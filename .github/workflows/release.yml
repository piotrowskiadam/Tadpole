name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Linux Builds: Deb, Rpm, AppImage
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      # Install GTK4 & Adwaita dependencies for compilation
      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config \
            fuse libfuse2 desktop-file-utils

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Build standard release binary for deb/rpm/AppImage
      - name: Build Rust binary
        run: cargo build --release

      # Install cargo-binstall and packaging tools
      - name: Install cargo packaging tools
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y cargo-deb cargo-generate-rpm

      # Package Deb
      - name: Build Debian package
        run: cargo deb

      # Package Rpm
      - name: Build RPM package
        run: cargo generate-rpm

      # Build AppImage
      - name: Build AppImage package
        run: ./build_appimage.sh

      # Stage into a single directory for upload
      - name: Stage Linux artifacts
        run: |
          mkdir -p staging
          cp target/debian/*.deb staging/ 2>/dev/null || true
          cp target/generate-rpm/*.rpm staging/ 2>/dev/null || true
          cp Tadpole-x86_64.AppImage staging/ 2>/dev/null || true

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tadpole-linux-packages
          path: staging/

  # Snap Build — uses official snapcore/action-build which sets up LXD automatically
  # This is the canonical way to build snaps in CI (no --destructive-mode, no permission issues)
  build-snap:
    name: Build Linux Snap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup LXD
        uses: canonical/setup-lxd@v1

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap
        run: snapcraft

      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tadpole-snap
          path: "*.snap"

  # Windows Builds: Zip, Exe Installer
  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-pkg-config
            zip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-gnu

      - name: Compile and Package
        shell: msys2 {0}
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /mingw64/lib/pkgconfig
        run: |
          echo "=== Building Tadpole in Release mode ==="
          cargo build --release --target x86_64-pc-windows-gnu

          echo "=== Creating distribution package ==="
          DIST_DIR="dist/tadpole-windows"
          rm -rf dist
          mkdir -p "$DIST_DIR"

          cp target/x86_64-pc-windows-gnu/release/tadpole.exe "$DIST_DIR/"
          cp tadpolelogo.png "$DIST_DIR/"
          cp tadpolelogonobg.png "$DIST_DIR/"

          echo "=== Resolving and copying DLL dependencies ==="
          dependencies=$(ldd target/x86_64-pc-windows-gnu/release/tadpole.exe | grep /mingw64/bin | awk '{print $3}')
          for dll in $dependencies; do
              cp "$dll" "$DIST_DIR/"
          done

          echo "=== Copying GSettings schemas ==="
          SCHEMA_DIR="$DIST_DIR/share/glib-2.0/schemas"
          mkdir -p "$SCHEMA_DIR"
          cp /mingw64/share/glib-2.0/schemas/org.gtk.Settings.FileChooser.gschema.xml "$SCHEMA_DIR/" 2>/dev/null || true
          cp /mingw64/share/glib-2.0/schemas/gschemas.compiled "$SCHEMA_DIR/" 2>/dev/null || true

          echo "=== Packaging into tadpole-windows.zip ==="
          cd dist
          zip -r tadpole-windows.zip tadpole-windows/
          cd ..

      # Build Windows Single-File Installer (.exe) using Inno Setup
      - name: Build Windows Installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Stage Windows artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp dist/tadpole-windows.zip staging/ 2>/dev/null || true
          cp dist/TadpoleSetup.exe staging/ 2>/dev/null || true

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tadpole-windows-packages
          path: staging/

  # Create Release and Publish Assets
  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-snap, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v8
        with:
          name: tadpole-linux-packages
          path: release-assets/

      - name: Download Snap Artifact
        uses: actions/download-artifact@v8
        with:
          name: tadpole-snap
          path: release-assets/

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v8
        with:
          name: tadpole-windows-packages
          path: release-assets/

      - name: List release assets
        run: ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
